<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ragames</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000814;
color:white;
text-align:center;
}

header{
background:#001d3d;
padding:20px;
box-shadow:0 0 15px cyan;
}

h1{
color:cyan;
margin:0;
}

.game-card{
background:#003566;
width:300px;
margin:30px auto;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px cyan;
}

canvas{
background:black;
border:2px solid cyan;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:cyan;
color:black;
font-size:18px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🎮 Ragames</h1>
<p>Play Free Games Online</p>
</header>

<div class="game-card">
<h2>Snake Game</h2>

<canvas id="game" width="300" height="300"></canvas>

<br>

<button onclick="startGame()">Start Game</button>

</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let snake=[{x:150,y:150}];
let food={x:60,y:60};
let dx=10;
let dy=0;
let game;

function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,300,300);

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,10,10);

ctx.fillStyle="lime";
snake.forEach(part=>{
ctx.fillRect(part.x,part.y,10,10);
});

const head={x:snake[0].x+dx,y:snake[0].y+dy};

snake.unshift(head);

if(head.x==food.x && head.y==food.y){
food={
x:Math.floor(Math.random()*30)*10,
y:Math.floor(Math.random()*30)*10
};
}else{
snake.pop();
}

if(head.x<0||head.x>=300||head.y<0||head.y>=300){
clearInterval(game);
alert("Game Over");
}
}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowUp"){dx=0;dy=-10;}
if(e.key=="ArrowDown"){dx=0;dy=10;}
if(e.key=="ArrowLeft"){dx=-10;dy=0;}
if(e.key=="ArrowRight"){dx=10;dy=0;}
});

function startGame(){
clearInterval(game);
snake=[{x:150,y:150}];
dx=10;
dy=0;
game=setInterval(draw,100);
}
</script>

</body>
</html>
