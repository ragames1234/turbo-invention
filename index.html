<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ragames</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000814;
color:white;
text-align:center;
}
header{
background:#001d3d;
padding:20px;
box-shadow:0 0 20px cyan;
}
h1{
color:#00e5ff;
}
.game{
background:#003566;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px cyan;
}
button{
padding:10px 20px;
background:#00b4d8;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}
button:hover{
background:#48cae4;
}
</style>
</head>
<body>

<header>
<h1>🎮 Ragames</h1>
<p>Welcome to Ragames!</p>
</header>

<div class="game">
<h2>Guess the Number</h2>
<button onclick="playGame()">Play</button>
<p id="result"></p>
</div>

<script>
function playGame(){
let secret=Math.floor(Math.random()*10)+1;
let guess=prompt("Guess a number between 1 and 10");
if(Number(guess)===secret){
document.getElementById("result").innerHTML="🎉 You Win!";
}else{
document.getElementById("result").innerHTML="❌ Wrong! Number was "+secret;
}
}
</script>

</body>
</html>
